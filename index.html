<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Newsletter RSS Feed</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 600px; margin: 4rem auto; padding: 0 1rem; color: #222; }
    a { color: #0066cc; }
    code { background: #f4f4f4; padding: 2px 6px; border-radius: 4px; font-size: 0.9em; }
  </style>
</head>
<body>
  <h1>📰 Newsletter RSS Feed</h1>
  <p>This is a private RSS feed generated from newsletter emails.</p>
  <p>Subscribe in Feedly or any RSS reader using:</p>
  <p><code id="feed-url"></code></p>
  <script>
    document.getElementById('feed-url').textContent = window.location.origin + window.location.pathname.replace(/\/?$/, '/') + 'feed.xml';
  </script>
</body>
</html>
